name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, type-check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Stub values so the apps can build without real secrets in CI.
      # Override in repo secrets if you want CI to hit a real Supabase project.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_stub' }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || '' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@9.15.0) — don't also pin it
      # here or pnpm/action-setup errors with ERR_PNPM_BAD_PM_VERSION (multiple versions).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm -r type-check

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

  migration-safety:
    name: Migration safety check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect destructive migrations
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # supabase/migrations is the canonical migration path if it exists.
          # We don't have local migration files (MCP-managed), so this check
          # is a placeholder for once they're checked in.
          if git diff --name-only "$base" "$head" | grep -q '^supabase/migrations/'; then
            echo "Migration changes detected — please review for destructive ops"
            new_files=$(git diff --name-only --diff-filter=A "$base" "$head" | grep '^supabase/migrations/' || true)
            for f in $new_files; do
              if grep -iE '(drop table|drop column|truncate|delete from)' "$f"; then
                echo "::warning file=$f::Potentially destructive SQL detected"
              fi
            done
          fi
